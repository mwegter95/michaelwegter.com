<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Growyard preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4F0E6"/>
      <stop offset="100%" stop-color="#E9E2D0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle dot texture -->
  <g fill="#5C6E58" fill-opacity="0.04">
    <circle cx="160" cy="80"   r="4"/>
    <circle cx="940" cy="120"  r="3"/>
    <circle cx="380" cy="600"  r="3"/>
    <circle cx="1120" cy="640" r="4"/>
    <circle cx="700" cy="380"  r="3"/>
  </g>

  <!-- Header band -->
  <g transform="translate(120, 90)">
    <!-- Leaf icon -->
    <g transform="translate(0, 0)" stroke="#4F6F44" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 22 C 6 4, 22 -4, 36 0 C 40 18, 28 30, 10 32 Z"/>
      <line x1="6" y1="28" x2="30" y2="6"/>
    </g>
    <text x="52" y="22" font-family="'Fraunces', 'Times New Roman', serif" font-size="32" fill="#2C3A2A" font-weight="500">The Yard Almanac</text>
    <text x="52" y="48" font-family="'Inter', sans-serif" font-size="13" fill="#7a7567" letter-spacing="2" font-weight="500">BIRCHWOOD VILLAGE · ZONE 4b</text>
  </g>

  <!-- View toggle pill -->
  <g transform="translate(900, 80)">
    <rect width="240" height="44" rx="22" fill="rgba(92, 110, 88, 0.10)"/>
    <rect x="6" y="6" width="116" height="32" rx="16" fill="#ffffff"/>
    <text x="64" y="27" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#2C3A2A" font-weight="600">Calendar</text>
    <text x="180" y="27" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#5C6E58" font-weight="600">Plants</text>
  </g>

  <!-- Month strip -->
  <g transform="translate(120, 200)">
    <g font-family="'Fraunces', serif" font-size="15" fill="#5C6E58">
      <g><rect width="68" height="56" rx="14" fill="rgba(255,255,255,0.5)" stroke="rgba(92, 110, 88, 0.20)"/><text x="34" y="28" text-anchor="middle">Mar</text><text x="34" y="44" text-anchor="middle" font-size="10" fill="#7a7567">2</text></g>
      <g transform="translate(76,0)"><rect width="68" height="56" rx="14" fill="rgba(255,255,255,0.5)" stroke="rgba(92, 110, 88, 0.20)"/><text x="34" y="28" text-anchor="middle">Apr</text><text x="34" y="44" text-anchor="middle" font-size="10" fill="#7a7567">4</text></g>
      <g transform="translate(152,0)"><rect width="68" height="56" rx="14" fill="#2C3A2A" stroke="#2C3A2A"/><text x="34" y="28" text-anchor="middle" fill="#F4F0E6">May</text><text x="34" y="44" text-anchor="middle" font-size="10" fill="#F4F0E6" opacity="0.7">5</text></g>
      <g transform="translate(228,0)"><rect width="68" height="56" rx="14" fill="rgba(255,255,255,0.5)" stroke="rgba(92, 110, 88, 0.20)"/><text x="34" y="28" text-anchor="middle">Jun</text><text x="34" y="44" text-anchor="middle" font-size="10" fill="#7a7567">4</text></g>
      <g transform="translate(304,0)"><rect width="68" height="56" rx="14" fill="rgba(255,255,255,0.5)" stroke="rgba(92, 110, 88, 0.20)"/><text x="34" y="28" text-anchor="middle">Jul</text><text x="34" y="44" text-anchor="middle" font-size="10" fill="#7a7567">3</text></g>
      <g transform="translate(380,0)"><rect width="68" height="56" rx="14" fill="rgba(255,255,255,0.5)" stroke="rgba(92, 110, 88, 0.20)"/><text x="34" y="28" text-anchor="middle">Aug</text><text x="34" y="44" text-anchor="middle" font-size="10" fill="#7a7567">2</text></g>
      <g transform="translate(456,0)"><rect width="68" height="56" rx="14" fill="rgba(255,255,255,0.5)" stroke="rgba(92, 110, 88, 0.20)"/><text x="34" y="28" text-anchor="middle">Sep</text><text x="34" y="44" text-anchor="middle" font-size="10" fill="#7a7567">3</text></g>
      <g transform="translate(532,0)"><rect width="68" height="56" rx="14" fill="rgba(255,255,255,0.5)" stroke="rgba(92, 110, 88, 0.20)"/><text x="34" y="28" text-anchor="middle">Oct</text><text x="34" y="44" text-anchor="middle" font-size="10" fill="#7a7567">3</text></g>
      <g transform="translate(608,0)"><rect width="68" height="56" rx="14" fill="rgba(255,255,255,0.5)" stroke="rgba(92, 110, 88, 0.20)"/><text x="34" y="28" text-anchor="middle">Nov</text><text x="34" y="44" text-anchor="middle" font-size="10" fill="#7a7567">2</text></g>
    </g>
  </g>

  <!-- Month title -->
  <g transform="translate(120, 310)">
    <text font-family="'Fraunces', serif" font-size="56" fill="#2C3A2A" font-weight="400">May</text>
    <g transform="translate(0, 38)">
      <rect width="600" height="6" rx="3" fill="rgba(92, 110, 88, 0.15)"/>
      <rect width="360" height="6" rx="3" fill="#4F6F44"/>
      <text x="616" y="6" font-family="'Inter', sans-serif" font-size="13" fill="#7a7567" font-weight="500">3 of 5</text>
    </g>
  </g>

  <!-- Task cards -->
  <g transform="translate(120, 420)">
    <!-- Card 1 -->
    <g transform="translate(0,0)">
      <rect width="1040" height="76" rx="14" fill="url(#card)" stroke="rgba(92, 110, 88, 0.14)"/>
      <rect x="20" y="26" width="26" height="26" rx="8" fill="#4F6F44"/>
      <path d="M27 39 l5 5 l9 -10" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="66" y="35" font-family="'Inter', sans-serif" font-size="11" fill="#4F6F44" font-weight="600" letter-spacing="1.5">PLANT · 30 MIN</text>
      <text x="66" y="60" font-family="'Fraunces', serif" font-size="18" fill="#2C3A2A" opacity="0.5" text-decoration="line-through">Plant begonias after last frost</text>
    </g>
    <!-- Card 2 -->
    <g transform="translate(0, 88)">
      <rect width="1040" height="76" rx="14" fill="url(#card)" stroke="rgba(92, 110, 88, 0.14)"/>
      <rect x="20" y="26" width="26" height="26" rx="8" fill="none" stroke="#8B5A3C" stroke-width="2"/>
      <text x="66" y="35" font-family="'Inter', sans-serif" font-size="11" fill="#8B5A3C" font-weight="600" letter-spacing="1.5">PRUNE · 30 MIN</text>
      <text x="66" y="60" font-family="'Fraunces', serif" font-size="18" fill="#2C3A2A">Prune lilac immediately after it finishes blooming</text>
    </g>
    <!-- Card 3 -->
    <g transform="translate(0, 176)">
      <rect width="1040" height="76" rx="14" fill="url(#card)" stroke="rgba(92, 110, 88, 0.14)"/>
      <rect x="20" y="26" width="26" height="26" rx="8" fill="none" stroke="#A68A2D" stroke-width="2"/>
      <text x="66" y="35" font-family="'Inter', sans-serif" font-size="11" fill="#A68A2D" font-weight="600" letter-spacing="1.5">LAWN · 1 HOUR</text>
      <text x="66" y="60" font-family="'Fraunces', serif" font-size="18" fill="#2C3A2A">Spot-overseed bare strip by the foundation</text>
    </g>
  </g>
</svg>
